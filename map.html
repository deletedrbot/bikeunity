<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Карта маршрутов | Bike Unity</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    #map {
      height: 90vh;
      width: 100%;
      margin: 20px auto;
      border: 2px solid #ff5500;
      border-radius: 12px;
    }

    #controls {
      display: flex;
      gap: 10px;
      justify-content: center;
      padding: 10px;
    }

    input[type="file"] {
      background: #111;
      color: #fff;
      padding: 6px 10px;
      border-radius: 8px;
      border: 1px solid #ff5500;
    }

    button {
      background: #ff5500;
      border: none;
      padding: 6px 12px;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: #ff2200;
    }
  </style>
</head>
<body>
  <header>
    <h1>Карта маршрутов</h1>
    <nav>
      <a href="index.html">Главная</a>
      <a href="trips.html">Поездки</a>
      <a href="community.html">Сообщество</a>
      <a href="gallery.html">Галерея</a>
      <a href="map.html" class="active">Карта</a>
      <a href="contacts.html">Контакты</a>
      <a href="map.html">Карта маршрутов</a>
    </nav>
  </header>

  <main>
    <div id="controls">
      <input type="file" id="gpxFile" accept=".gpx" />
      <button id="locateBtn">Где я?</button>
    </div>
    <div id="map"></div>
  </main>

  <footer>
    <p>&copy; 2025 Bike Unity</p>
  </footer>

  <!-- Leaflet -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <!-- leaflet-gpx parser -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-gpx/1.5.1/gpx.min.js"></script>

  <script>
    const map = L.map('map').setView([52.0, 113.5], 12);

    // Карта OpenStreetMap
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    // Пример маршрутов
    const routes = [
      {
        name: 'Маршрут 1: Лесной',
        coords: [[52.010, 113.480], [52.020, 113.500], [52.015, 113.530]],
        color: '#ff5500',
      },
      {
        name: 'Маршрут 2: Горы',
        coords: [[52.000, 113.490], [52.005, 113.525], [52.015, 113.540]],
        color: '#00aaff',
      },
    ];

    routes.forEach(route => {
      L.polyline(route.coords, { color: route.color, weight: 4 }).addTo(map)
        .bindPopup(route.name);
    });

    // Загрузка GPX-файла
    document.getElementById('gpxFile').addEventListener('change', function (e) {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function (event) {
        const gpxData = event.target.result;
        const gpxLayer = new L.GPX(gpxData, {
          async: true,
          marker_options: {
            startIconUrl: null,
            endIconUrl: null,
            shadowUrl: null
          },
          polyline_options: {
            color: '#00ff88',
            weight: 4,
          }
        }).on('loaded', function (e) {
          map.fitBounds(e.target.getBounds());
        }).addTo(map);
      };
      reader.readAsText(file);
    });

    // Текущее местоположение
    document.getElementById('locateBtn').addEventListener('click', function () {
      map.locate({ setView: true, maxZoom: 15 });

      map.once('locationfound', function (e) {
        L.marker(e.latlng).addTo(map)
          .bindPopup('Вы здесь!')
          .openPopup();
      });

      map.once('locationerror', function (e) {
        alert('Невозможно определить местоположение.');
      });
    });
  </script>
</body>
</html>
